<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Tapis Vert — Bilan Carbone  de vos Événement</title>
<style>
:root {
  --vert: #1a6b3a; --vert-clair: #2d9b58; --vert-pale: #e8f5ee;
  --ardoise: #1e2a22; --ardoise2: #2c3a30;
  --gris: #6b7a6f; --gris-pale: #f4f7f5;
  --rouge: #c0392b; --orange: #e67e22; --bleu: #2980b9; --violet: #8e44ad;
  --bordure: #dce8e0; --shadow: 0 2px 12px rgba(26,107,58,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Segoe UI", system-ui, sans-serif; background: var(--gris-pale); color: var(--ardoise); min-height: 100vh; }

/* HEADER */
header { background: var(--ardoise); color: white; padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 60px; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--vert); }
.logo { font-size: 22px; font-weight: 800; color: white; }
.logo span { color: var(--vert-clair); }
.ademe-badge { font-size: 11px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 3px 8px; border-radius: 20px; color: #aaa; letter-spacing: 0.5px; text-transform: uppercase; }
header nav { margin-left: auto; display: flex; gap: 4px; }
header nav button { background: none; border: none; color: #aaa; cursor: pointer; padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: all 0.15s; }
header nav button:hover { background: rgba(255,255,255,0.08); color: white; }
header nav button.active { background: var(--vert); color: white; }

/* LAYOUT */
.app { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 60px); }
.sidebar { background: white; border-right: 1px solid var(--bordure); padding: 16px; overflow-y: auto; height: calc(100vh - 60px); position: sticky; top: 60px; }
.sidebar h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--gris); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--bordure); }
.main { padding: 24px; overflow-y: auto; }

/* SIDEBAR EVENTS */
.event-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.event-card { border: 1.5px solid var(--bordure); border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; background: white; }
.event-card:hover { border-color: var(--vert-clair); background: var(--vert-pale); }
.event-card.active { border-color: var(--vert); background: var(--vert-pale); box-shadow: 0 0 0 2px rgba(26,107,58,0.15); }
.event-card-header { display: flex; align-items: flex-start; gap: 8px; }
.event-card-icon { font-size: 22px; flex-shrink: 0; }
.event-card-info { flex: 1; min-width: 0; }
.event-card-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.event-card-date { font-size: 11px; color: var(--gris); margin-top: 1px; }
.event-card-co2 { font-size: 12px; font-weight: 700; color: var(--vert); margin-top: 5px; padding-top: 5px; border-top: 1px solid var(--bordure); display: flex; justify-content: space-between; align-items: center; }
.event-card-actions { display: flex; gap: 4px; margin-top: 5px; }
.btn-sm { font-size: 11px; padding: 2px 7px; border-radius: 5px; border: 1px solid var(--bordure); background: white; color: var(--gris); cursor: pointer; transition: all 0.1s; }
.btn-sm:hover { border-color: var(--rouge); color: var(--rouge); }
.btn-sm.edit:hover { border-color: var(--vert); color: var(--vert); }
.btn-sm.compare-btn { color: var(--bleu); border-color: var(--bleu); }
.btn-sm.compare-btn:hover { background: #ebf5fb; }
.btn-new-event { width: 100%; padding: 9px; border: 2px dashed var(--bordure); border-radius: 10px; background: none; color: var(--gris); font-size: 13px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
.btn-new-event:hover { border-color: var(--vert-clair); color: var(--vert); background: var(--vert-pale); }

/* EMPTY STATE */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 400px; text-align: center; color: var(--gris); }
.empty-state .big-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }
.empty-state h2 { font-size: 20px; color: var(--ardoise); margin-bottom: 8px; }
.empty-state p { font-size: 14px; max-width: 320px; line-height: 1.6; }

/* TABS */
.tab-bar { display: flex; gap: 4px; margin-bottom: 20px; background: white; padding: 5px; border-radius: 12px; box-shadow: var(--shadow); width: fit-content; }
.tab-btn { padding: 8px 18px; border: none; background: none; border-radius: 8px; font-size: 13px; font-weight: 600; color: var(--gris); cursor: pointer; transition: all 0.15s; }
.tab-btn.active { background: var(--vert); color: white; }
.tab-btn:hover:not(.active) { background: var(--gris-pale); }

/* EVENT HEADER */
.event-header { background: white; border-radius: 14px; padding: 20px 24px; margin-bottom: 20px; box-shadow: var(--shadow); display: flex; align-items: flex-start; gap: 16px; }
.event-icon-big { font-size: 44px; }
.event-header-info { flex: 1; }
.event-header-info h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.event-meta { font-size: 13px; color: var(--gris); margin-top: 3px; }
.event-header-co2 { text-align: right; }
.total-label { font-size: 11px; color: var(--gris); text-transform: uppercase; letter-spacing: 0.5px; }
.total-value { font-size: 30px; font-weight: 900; color: var(--vert); line-height: 1.1; }
.total-unit { font-size: 13px; color: var(--gris); }

/* CARDS GRID */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-card { background: white; border-radius: 12px; padding: 16px; box-shadow: var(--shadow); }
.stat-card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gris); margin-bottom: 6px; }
.stat-card-value { font-size: 22px; font-weight: 800; }
.stat-card-sub { font-size: 11px; color: var(--gris); margin-top: 3px; }

/* CHART SECTION */
.chart-section { background: white; border-radius: 14px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
.chart-section h3 { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
.chart-wrap { position: relative; }

/* Donut chart SVG */
.donut-row { display: grid; grid-template-columns: 200px 1fr; gap: 20px; align-items: center; }
.donut-legend { display: flex; flex-direction: column; gap: 8px; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.legend-name { flex: 1; color: var(--ardoise); }
.legend-val { font-weight: 700; color: var(--ardoise); }
.legend-pct { color: var(--gris); width: 40px; text-align: right; }

/* BAR CHART */
.bar-chart { padding: 0; }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 12px; }
.bar-label { width: 180px; color: var(--ardoise); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
.bar-track { flex: 1; height: 10px; background: var(--bordure); border-radius: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 5px; transition: width 0.6s ease; }
.bar-value { width: 90px; text-align: right; font-weight: 600; color: var(--vert); }

/* ADD SECTION */
.add-section { background: white; border-radius: 14px; padding: 18px; margin-bottom: 16px; box-shadow: var(--shadow); }
.add-section h3 { font-size: 13px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.cat-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
.cat-pill { padding: 4px 10px; border-radius: 20px; border: 1.5px solid var(--bordure); background: white; font-size: 11px; cursor: pointer; transition: all 0.12s; white-space: nowrap; color: var(--ardoise); }
.cat-pill:hover { border-color: var(--vert-clair); background: var(--vert-pale); }
.cat-pill.active { background: var(--vert); border-color: var(--vert); color: white; }
.search-input { width: 100%; padding: 9px 14px; border: 1.5px solid var(--bordure); border-radius: 10px; font-size: 14px; outline: none; background: var(--gris-pale); transition: border-color 0.15s; margin-bottom: 10px; }
.search-input:focus { border-color: var(--vert); background: white; }
.results-list { max-height: 260px; overflow-y: auto; border: 1px solid var(--bordure); border-radius: 10px; display: none; }
.results-list.visible { display: block; }
.result-item { padding: 9px 12px; cursor: pointer; display: flex; align-items: flex-start; gap: 10px; border-bottom: 1px solid var(--bordure); transition: background 0.1s; }
.result-item:last-child { border-bottom: none; }
.result-item:hover { background: var(--vert-pale); }
.result-item-info { flex: 1; }
.result-item-name { font-size: 13px; font-weight: 600; }
.result-item-cat { font-size: 11px; color: var(--gris); margin-top: 1px; }
.result-item-co2 { font-size: 12px; font-weight: 700; color: var(--vert-clair); text-align: right; white-space: nowrap; }
.result-item-unit { font-size: 10px; color: var(--gris); }
.no-results { padding: 20px; text-align: center; color: var(--gris); font-size: 13px; }

.selected-item-row { display: none; background: var(--vert-pale); border: 1.5px solid var(--vert-clair); border-radius: 10px; padding: 12px; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
.selected-item-row.visible { display: flex; }
.selected-item-info { flex: 1; }
.selected-item-name { font-size: 13px; font-weight: 700; }
.selected-item-cat { font-size: 11px; color: var(--gris); margin-top: 2px; }
.quantity-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.quantity-label { font-size: 12px; font-weight: 600; white-space: nowrap; }
.qty-input { width: 90px; padding: 7px 10px; border: 1.5px solid var(--bordure); border-radius: 8px; font-size: 14px; font-weight: 600; outline: none; text-align: center; }
.qty-input:focus { border-color: var(--vert); }
.co2-preview { font-size: 13px; font-weight: 700; color: var(--vert); white-space: nowrap; min-width: 90px; text-align: right; }
.btn-add { padding: 8px 16px; background: var(--vert); color: white; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.btn-add:hover { background: var(--vert-clair); }
.btn-cancel-sel { padding: 5px 9px; background: none; border: 1px solid var(--bordure); border-radius: 6px; font-size: 11px; color: var(--gris); cursor: pointer; }

/* ELEC SECTION */
.elec-section { background: linear-gradient(135deg, #e8f5ee, #f0f9ff); border: 1.5px solid #b8dfc9; border-radius: 14px; padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
.elec-section h3 { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.elec-subtitle { font-size: 11px; color: var(--gris); margin-bottom: 12px; padding: 6px 10px; background: rgba(255,255,255,0.6); border-radius: 8px; border-left: 3px solid var(--vert-clair); }
.elec-form { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
.elec-field { display: flex; flex-direction: column; gap: 4px; }
.elec-field label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.elec-input { padding: 8px 11px; border: 1.5px solid var(--bordure); border-radius: 8px; font-size: 14px; outline: none; background: white; }
.elec-input:focus { border-color: var(--vert); }
.elec-input[type="number"] { width: 120px; text-align: center; font-weight: 600; }
.elec-input[type="text"] { width: 200px; }
.elec-preview { font-size: 13px; font-weight: 700; color: var(--vert); padding: 8px 12px; background: var(--vert-pale); border-radius: 8px; white-space: nowrap; align-self: flex-end; }
.elec-factor-note { font-size: 10px; color: var(--gris); margin-top: 8px; font-style: italic; }

/* AI SECTION */
.ai-section { background: linear-gradient(135deg, #9c9da1, #f0f4ff); border: 1.5px solid #f8f7fa; border-radius: 14px; padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
.ai-section h3 { font-size: 13px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.ai-subtitle { font-size: 11px; color: var(--gris); margin-bottom: 12px; padding: 6px 10px; background: rgba(255,255,255,0.6); border-radius: 8px; border-left: 3px solid #170c1c; }
.ai-form { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
.ai-input { padding: 8px 11px; border: 1.5px solid var(--bordure); border-radius: 8px; font-size: 14px; outline: none; background: white; flex: 1; min-width: 200px; }
.ai-input:focus { border-color: #8e44ad; }
.btn-ai { padding: 8px 16px; background: #160c1a; color: white; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
.btn-ai:hover { background: #141414; }
.btn-ai:disabled { background: #ccc; cursor: not-allowed; }
.ai-result { margin-top: 12px; background: white; border-radius: 10px; padding: 14px; border: 1px solid #f5fafa; display: none; }
.ai-result.visible { display: block; }
.ai-result-header { font-size: 12px; font-weight: 700; color: #0f0712; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.ai-items { display: flex; flex-direction: column; gap: 6px; }
.ai-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--gris-pale); border-radius: 8px; font-size: 12px; }
.ai-item-name { flex: 1; font-weight: 600; }
.ai-item-detail { color: var(--gris); }
.ai-item-co2 { font-weight: 700; color: #3f3e40; }
.ai-item-add { padding: 4px 10px; background: var(--vert); color: white; border: none; border-radius: 6px; font-size: 11px; cursor: pointer; }
.ai-loading { text-align: center; padding: 20px; color: var(--gris); font-size: 13px; }
.ai-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #c8c5d1; border-top-color: #645f66; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
.ai-co2-note { font-size: 10px; color: var(--gris); margin-top: 8px; padding: 4px 8px; background: #f8f4ff; border-radius: 6px; text-align: center; }

/* SAISIE MANUELLE */
.manual-section { background: linear-gradient(135deg, #fff8e8, #fffbf0); border: 1.5px solid #f0d080; border-radius: 14px; padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
.manual-section h3 { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.manual-subtitle { font-size: 11px; color: var(--gris); margin-bottom: 12px; padding: 6px 10px; background: rgba(255,255,255,0.6); border-radius: 8px; border-left: 3px solid #e6a817; }
.manual-form { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
.manual-field { display: flex; flex-direction: column; gap: 4px; }
.manual-field label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ardoise); }
.manual-input { padding: 8px 11px; border: 1.5px solid var(--bordure); border-radius: 8px; font-size: 14px; outline: none; background: white; transition: border-color 0.15s; }
.manual-input:focus { border-color: #e6a817; }
.manual-input[type="text"] { width: 220px; }
.manual-input[type="number"] { width: 130px; text-align: center; font-weight: 600; }
.btn-manual { padding: 8px 16px; background: #e6a817; color: white; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.btn-manual:hover { background: #c99010; }
.pill-manual { background: #fff3cd; color: #856404; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ITEMS TABLE */
.items-section { background: white; border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; }
.items-section-header { padding: 14px 18px; border-bottom: 1px solid var(--bordure); display: flex; align-items: center; gap: 10px; }
.items-section-header h3 { font-size: 13px; font-weight: 700; flex: 1; }
.items-table-header { display: grid; grid-template-columns: 1fr 100px 90px 80px 36px; gap: 8px; padding: 8px 18px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gris); border-bottom: 1px solid var(--bordure); background: var(--gris-pale); }
.item-row { display: grid; grid-template-columns: 1fr 100px 90px 80px 36px; gap: 8px; padding: 10px 18px; border-bottom: 1px solid var(--bordure); align-items: center; transition: background 0.1s; }
.item-row:last-child { border-bottom: none; }
.item-row:hover { background: var(--gris-pale); }
.item-row-name { font-size: 12px; font-weight: 600; }
.item-row-name small { font-weight: 400; color: var(--gris); display: block; font-size: 10px; }
.item-row-qty { font-size: 12px; }
.item-row-unit { font-size: 11px; color: var(--gris); }
.item-row-co2 { font-size: 12px; font-weight: 700; color: var(--vert); }
.btn-del { width: 26px; height: 26px; border-radius: 5px; border: none; background: none; color: #ccc; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all 0.1s; }
.btn-del:hover { background: #fef2f2; color: var(--rouge); }
.empty-items { padding: 36px; text-align: center; color: var(--gris); font-size: 13px; }

/* COMPARE */
.compare-section { background: white; border-radius: 14px; padding: 20px; box-shadow: var(--shadow); }
.compare-section h2 { font-size: 16px; font-weight: 800; margin-bottom: 16px; }
.compare-select-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; margin-bottom: 24px; }
.compare-vs { font-size: 20px; font-weight: 900; color: var(--gris); text-align: center; }
.compare-select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--bordure); border-radius: 10px; font-size: 14px; outline: none; }
.compare-select:focus { border-color: var(--bleu); }
.compare-header-row { display: grid; grid-template-columns: 1fr 130px 130px 110px; gap: 8px; padding: 8px 12px; background: var(--ardoise); color: white; border-radius: 10px 10px 0 0; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.compare-row { display: grid; grid-template-columns: 1fr 130px 130px 110px; gap: 8px; padding: 10px 12px; border-bottom: 1px solid var(--bordure); font-size: 12px; align-items: center; }
.compare-row:last-child { border-bottom: none; }
.compare-row:hover { background: var(--gris-pale); }
.compare-row.total-row { background: var(--vert-pale); font-weight: 700; border-top: 2px solid var(--vert); }
.delta-positive { color: var(--rouge); font-weight: 700; }
.delta-negative { color: var(--vert); font-weight: 700; }
.delta-zero { color: var(--gris); }
.compare-bar-section { margin-top: 24px; }
.compare-bar-group { margin-bottom: 14px; }
.compare-bar-label { font-size: 12px; font-weight: 600; margin-bottom: 5px; }
.compare-bar-pair { display: flex; flex-direction: column; gap: 3px; }
.compare-bar-row { display: flex; align-items: center; gap: 8px; font-size: 11px; }
.compare-bar-name { width: 100px; color: var(--gris); text-align: right; flex-shrink: 0; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.compare-bar-track { flex: 1; height: 8px; background: var(--bordure); border-radius: 4px; overflow: hidden; }
.compare-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
.compare-bar-val { width: 80px; font-weight: 600; font-size: 11px; }
.compare-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.compare-card { border-radius: 12px; padding: 16px; text-align: center; }
.compare-card-label { font-size: 11px; color: var(--gris); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.compare-card-value { font-size: 22px; font-weight: 900; }
.compare-card-sub { font-size: 11px; color: var(--gris); margin-top: 3px; }
.compare-empty { padding: 40px; text-align: center; color: var(--gris); }

/* RAPPORT */
.rapport-section { display: flex; flex-direction: column; gap: 20px; }
.rapport-card { background: white; border-radius: 14px; padding: 20px; box-shadow: var(--shadow); }
.rapport-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
.kpi-box { border: 1.5px solid var(--bordure); border-radius: 10px; padding: 14px; text-align: center; }
.kpi-value { font-size: 24px; font-weight: 900; color: var(--vert); }
.kpi-label { font-size: 11px; color: var(--gris); margin-top: 4px; line-height: 1.4; }
.top-list { display: flex; flex-direction: column; gap: 6px; }
.top-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--gris-pale); border-radius: 8px; font-size: 12px; }
.top-item-rank { width: 24px; height: 24px; border-radius: 50%; background: var(--vert); color: white; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.top-item-name { flex: 1; font-weight: 600; }
.top-item-co2 { font-weight: 700; color: var(--vert); }
.top-item-pct { font-size: 11px; color: var(--gris); width: 40px; text-align: right; }
.benchmark-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--bordure); font-size: 13px; }
.benchmark-row:last-child { border-bottom: none; }
.benchmark-icon { font-size: 20px; width: 32px; text-align: center; flex-shrink: 0; }
.benchmark-label { flex: 1; }
.benchmark-val { font-weight: 700; color: var(--vert); }

// ===== AUTH STATE =====
let currentUser = null;       // { id, email }
let accessToken = null;       // JWT pour les requêtes authentifiées
let refreshToken = null;

function saveSession(session) {
  accessToken = session.access_token;
  refreshToken = session.refresh_token;
  currentUser = { id: session.user.id, email: session.user.email };
  localStorage.setItem('sb_session', JSON.stringify({ access_token: accessToken, refresh_token: refreshToken, user: currentUser }));
}

function loadSession() {
  try {
    const raw = localStorage.getItem('sb_session');
    if (!raw) return false;
    const s = JSON.parse(raw);
    accessToken = s.access_token;
    refreshToken = s.refresh_token;
    currentUser = s.user;
    return true;
  } catch(e) { return false; }
}

function clearSession() {
  accessToken = null; refreshToken = null; currentUser = null;
  localStorage.removeItem('sb_session');
}

async function sbAuth(endpoint, body) {
  const res = await fetch(SB_URL + '/auth/v1/' + endpoint, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || data.error || 'Erreur d\'authentification');
  return data;
}

async function refreshSession() {
  if (!refreshToken) throw new Error('Pas de session');
  const data = await sbAuth('token?grant_type=refresh_token', { refresh_token: refreshToken });
  saveSession(data);
}

async function sbFetch(method, id, body) {
  const url = SB_URL + '/rest/v1/events' + (id ? '?id=eq.' + encodeURIComponent(id) : '');
  const doFetch = (token) => fetch(url, {
    method,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'resolution=merge-duplicates' : ''
    },
    body: body ? JSON.stringify(body) : undefined
  });
  let res = await doFetch(accessToken);
  if (res.status === 401) {
    // Token expiré, on tente un refresh
    await refreshSession();
    res = await doFetch(accessToken);
  }
  if (!res.ok) throw new Error(await res.text());
  return method === 'GET' ? res.json() : res;
}

async function loadEventsFromSupabase() {
  try {
    const rows = await sbFetch('GET');
    return rows.map(r => r.data);
  } catch(e) {
    console.warn('Supabase indisponible, fallback localStorage', e);
    return JSON.parse(localStorage.getItem('carbonEvents') || '[]');
  }
}

async function saveEventToSupabase(ev) {
  if (!currentUser) return;
  try {
    await sbFetch('POST', null, [{ id: ev.id, user_id: currentUser.id, data: ev, updated_at: new Date().toISOString() }]);
  } catch(e) {
    console.warn('Erreur Supabase save:', e);
  }
}

async function deleteEventFromSupabase(id) {
  try {
    await sbFetch('DELETE', id);
  } catch(e) {
    console.warn('Erreur Supabase delete:', e);
  }
}

// ===== UTILS =====
function formatCO2(kg) {
  if (kg >= 1000) return (kg/1000).toFixed(2) + ' tCO₂e';
  if (kg >= 1) return kg.toFixed(2) + ' kgCO₂e';
  return (kg*1000).toFixed(0) + ' gCO₂e';
}
function co2Color(kg) {
  if (kg < 10) return 'co2-low';
  if (kg < 100) return 'co2-mid';
  return 'co2-high';
}
function totalCO2(ev) { return (ev.items||[]).reduce((s,i) => s+i.co2_total, 0) + (ev.aiRequests||0)*0.003; }
function saveEvents(changedEventId) {
  localStorage.setItem('carbonEvents', JSON.stringify(events));
  localStorage.setItem('carbonEventsSavedAt', new Date().toISOString());
  updateSaveStatus();
  // Sync vers Supabase
  if (changedEventId) {
    const ev = events.find(e => e.id === changedEventId);
    if (ev) saveEventToSupabase(ev);
  } else {
    // Sync tous les événements
    events.forEach(ev => saveEventToSupabase(ev));
  }
}

function updateSaveStatus() {
  const el = document.getElementById('saveStatus');
  if (!el) return;
  const saved = localStorage.getItem('carbonEventsSavedAt');
  if (saved) {
    const d = new Date(saved);
    el.textContent = 'Auto-sauvegardé ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
  }
}

function exportData() {
  const payload = { version: 1, exportedAt: new Date().toISOString(), events };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'carboevent-sauvegarde-' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  showToast('Sauvegarde JSON téléchargée !', true);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const payload = JSON.parse(ev.target.result);
      const imported = payload.events || payload;
      if (!Array.isArray(imported)) throw new Error('Format invalide');
      let added = 0, updated = 0;
      imported.forEach(ev => {
        const idx = events.findIndex(e => e.id === ev.id);
        if (idx >= 0) { events[idx] = ev; updated++; }
        else { events.unshift(ev); added++; }
      });
      saveEvents();
      renderSidebar();
      if (events.length > 0) selectEvent(events[0].id);
      showToast(added + ' ajouté(s), ' + updated + ' mis à jour', true);
    } catch(err) {
      showToast('Fichier invalide : ' + err.message);
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}
function showToast(msg, green) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (green ? ' green' : '');
  setTimeout(() => t.className = 'toast', 2600);
}

// ===== DONUT SVG =====
function buildDonutSVG(sortedRubrics, total) {
  if (!total || !sortedRubrics.length) return '<svg width="160" height="160"><circle cx="80" cy="80" r="60" fill="none" stroke="#dce8e0" stroke-width="24"/></svg>';
  const cx=80, cy=80, r=60, sw=24;
  const circ = 2*Math.PI*r;
  let offset = 0;
  const slices = sortedRubrics.map(([rub,co2],i) => {
    const pct = co2/total;
    const dash = pct*circ;
    const gap = circ - dash;
    const slice = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${COLORS[i%12]}" stroke-width="${sw}" stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}" stroke-dashoffset="${(-offset*circ + circ/4).toFixed(2)}" style="transition:all 0.4s"/>`;
    offset += pct;
    return slice;
  });
  return `<svg width="160" height="160" viewBox="0 0 160 160">
    ${slices.join('')}
    <text x="80" y="76" text-anchor="middle" font-size="13" font-weight="800" fill="#1e2a22">${total>=1000?(total/1000).toFixed(1)+'t':total.toFixed(1)+'kg'}</text>
    <text x="80" y="92" text-anchor="middle" font-size="10" fill="#6b7a6f">CO₂e</text>
  </svg>`;
}

function getAllRubrics() {
  const seen = {};
  DB.forEach(i => { if(!seen[i.rubrique_id]) seen[i.rubrique_id] = i.rubrique; });
  return Object.entries(seen).map(([id,label]) => ({id,label})).sort((a,b) => a.label.localeCompare(b.label));
}

function filterCat(catId) {
  currentCat = catId;
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.toggle('active', p.dataset.cat === catId));
  const q = document.getElementById('searchInput')?.value || '';
  performSearch(q);
}

// ===== SEARCH =====
function onSearch(val) { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => performSearch(val), 150); }
function onSearchFocus() { const q = document.getElementById('searchInput')?.value||''; if(q.length>=1||currentCat) performSearch(q); }

function performSearch(q) {
  const list = document.getElementById('resultsList');
  if (!list) return;
  const query = q.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  let results = DB;
  if (currentCat) results = results.filter(i => i.rubrique_id === currentCat);
  if (query.length >= 1) results = results.filter(i => (i.label+' '+i.tags+' '+i.categorie).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(query));
  if (!currentCat && query.length < 1) { list.classList.remove('visible'); return; }
  results = results.slice(0, 80);
  list.classList.add('visible');
  if (!results.length) { list.innerHTML = '<div class="no-results">Aucun résultat — essayez l\'estimation IA ✨</div>'; return; }
  list.innerHTML = results.map((item) => {
    const f = item.co2_par_unite;
    return `<div class="result-item" onclick="selectItem(${DB.indexOf(item)})">
      <div style="font-size:16px">${item.rubrique.split(' ')[0]}</div>
      <div class="result-item-info">
        <div class="result-item-name">${item.label}</div>
        <div class="result-item-cat">${item.categorie.split(' > ').slice(0,2).join(' › ')}</div>
      </div>
      <div>
        <div class="result-item-co2">${f>=1?f.toFixed(3):f.toFixed(6)}</div>
        <div class="result-item-unit">${item.input_unit}/CO₂e</div>
      </div>
    </div>`;
  }).join('');
}

  selectedItem = DB[idx];
  document.getElementById('resultsList').classList.remove('visible');

  document.getElementById('selectedName').textContent = selectedItem.label;
  document.getElementById('selectedCat').textContent = selectedItem.categorie.split(' > ').slice(0,2).join(' › ');
  document.getElementById('selectedFactor').textContent = 'Facteur : '+selectedItem.co2_par_unite+' kgCO₂e/'+selectedItem.input_unit;

// ===== IA EXTERNE =====
// ~0.003 kgCO2e par requête (estimation : ~0.001 kWh calcul serveur × 0.0461 + réseau + overhead)
const AI_REQ_CO2 = 0.003;

function openAI() {
  const query = document.getElementById('aiQuery')?.value.trim();
  if (!query) { showToast("Décrivez d'abord l'élément"); return; }

  // Incrémenter le compteur de requêtes IA sur l'événement courant
  const ev = events.find(e => e.id === currentEventId);
  if (ev) {
    ev.aiRequests = (ev.aiRequests || 0) + 1;
    saveEvents(ev.id);
    renderSidebar();
    // Mettre à jour uniquement le widget IA sans tout rerendre
    updateAICounter(ev);
  }

  const prompt = "Je calcule le bilan carbone d'un événement avec la Base Carbone ADEME. "
    + "L'élément suivant n'est pas dans la base : \"" + query + "\". "
    + "Peux-tu m'estimer son facteur d'émission en kgCO2e ? "
    + "Précise l'unité (kg, unité, repas, km...), la valeur numérique, et la source ou méthode. "
    + "Si possible propose 2-3 variantes (ex: avec/sans emballage, portion différente...).";
  window.open("https://claude.ai/new?q=" + encodeURIComponent(prompt), '_blank');
}

function updateAICounter(ev) {
  const n = ev.aiRequests || 0;
  const co2 = n * AI_REQ_CO2;
  const el = document.getElementById('aiCounterWidget');
  if (el) {
    el.innerHTML = `<span style="color:#8e44ad;font-weight:700">${n} requête${n>1?'s':''}</span> · <span style="font-weight:700;color:var(--ardoise)">${formatCO2(co2)}</span> émis`;
    el.style.display = 'flex';
  }
  // Mettre à jour le total affiché dans le header
  const totalEl = document.querySelector('.total-value');
  if (totalEl) {
    const baseTotal = (ev.items||[]).reduce((s,i) => s+i.co2_total, 0);
    const grandTotal = baseTotal + co2;
    totalEl.textContent = grandTotal >= 1000 ? (grandTotal/1000).toFixed(2) : grandTotal.toFixed(2);
    totalEl.nextElementSibling.textContent = grandTotal >= 1000 ? 'tCO₂e' : 'kgCO₂e';
  }
}

function exportPDF() {
  const ev = events.find(e => e.id === currentEventId);
  if (!ev) return;
  const total = totalCO2(ev);
  const items = ev.items || [];
  const byRubric = {};
  items.forEach(it => { byRubric[it.rubrique] = (byRubric[it.rubrique]||0)+it.co2_total; });
  const aiCo2 = (ev.aiRequests||0)*0.003;
  if (aiCo2>0) byRubric['🤖 Émissions IA'] = aiCo2;
  const sortedRubrics = Object.entries(byRubric).sort((a,b) => b[1]-a[1]);
  const sorted5 = [...items].sort((a,b)=>b.co2_total-a.co2_total).slice(0,5);

// ===== COMPARE VIEW =====
function renderCompareView() {
  if (events.length < 2) {
    return `<div class="compare-section"><h2>⚖️ Comparer deux événements</h2><div class="compare-empty">Créez au moins deux événements pour les comparer.</div></div>`;
  }
  const opts = events.map(ev => `<option value="${ev.id}">${ev.icon} ${ev.name}</option>`).join('');
  return `<div class="compare-section">
    <h2>⚖️ Comparer deux événements</h2>
    <div class="compare-select-row">
      <select class="compare-select" id="compareA" onchange="updateCompare()">${opts}</select>
      <div class="compare-vs">VS</div>
      <select class="compare-select" id="compareB" onchange="updateCompare()">${opts}</select>
    </div>
    <div id="compareResult"></div>
  </div>`;
}

function initCompareSelects() {
  if (events.length < 2) return;
  const a = document.getElementById('compareA');
  const b = document.getElementById('compareB');
  if (a && b) {
    a.value = events[0].id;
    b.value = events[1].id;
    updateCompare();
  }
}

function updateCompare() {
  const idA = document.getElementById('compareA')?.value;
  const idB = document.getElementById('compareB')?.value;
  const evA = events.find(e => e.id===idA);
  const evB = events.find(e => e.id===idB);
  const out = document.getElementById('compareResult');
  if (!evA||!evB||!out) return;
  if (idA===idB) { out.innerHTML='<div class="compare-empty">Sélectionnez deux événements différents.</div>'; return; }

  const totA = totalCO2(evA), totB = totalCO2(evB);
  const delta = totB - totA;
  const deltaPct = totA>0 ? ((delta/totA)*100).toFixed(1) : '—';

  // Rubriques union
  const rubsA = {}, rubsB = {};
  (evA.items||[]).forEach(i => rubsA[i.rubrique] = (rubsA[i.rubrique]||0)+i.co2_total);
  (evB.items||[]).forEach(i => rubsB[i.rubrique] = (rubsB[i.rubrique]||0)+i.co2_total);
  const allRubs = [...new Set([...Object.keys(rubsA),...Object.keys(rubsB)])].sort();
  const maxVal = Math.max(...allRubs.map(r => Math.max(rubsA[r]||0, rubsB[r]||0)), totA, totB, 1);

  // Summary cards
  const betterLabel = delta<0 ? `${evB.name} émet <strong>${formatCO2(Math.abs(delta))}</strong> de moins` : delta>0 ? `${evB.name} émet <strong>${formatCO2(delta)}</strong> de plus` : 'Émissions identiques';
  const summaryCards = `<div class="compare-summary">
    <div class="compare-card" style="background:#e8f5ee">
      <div class="compare-card-label">${evA.icon} ${evA.name}</div>
      <div class="compare-card-value" style="color:var(--vert)">${formatCO2(totA)}</div>
      <div class="compare-card-sub">${(evA.items||[]).length} postes</div>
    </div>
    <div class="compare-card" style="background:${delta<0?'#e8f5ee':delta>0?'#fdf0ed':'#f4f7f5'}">
      <div class="compare-card-label">Écart</div>
      <div class="compare-card-value" style="color:${delta<0?'var(--vert)':delta>0?'var(--rouge)':'var(--gris)'}">${delta===0?'=':(delta>0?'+':'')+formatCO2(delta)}</div>
      <div class="compare-card-sub">${delta===0?'identiques':(deltaPct==='—'?'':deltaPct+'% d\'évolution')}</div>
    </div>
    <div class="compare-card" style="background:#eaf4fb">
      <div class="compare-card-label">${evB.icon} ${evB.name}</div>
      <div class="compare-card-value" style="color:var(--bleu)">${formatCO2(totB)}</div>
      <div class="compare-card-sub">${(evB.items||[]).length} postes</div>
    </div>
  </div>
  <div style="font-size:13px;margin-bottom:20px;padding:12px 16px;background:${delta<0?'var(--vert-pale)':delta>0?'#fdf0ed':'var(--gris-pale)'};border-radius:10px;text-align:center">${betterLabel} (${Math.abs(deltaPct)}%)</div>`;

  // Comparison table per rubrique
  const tableRows = allRubs.map(rub => {
    const vA = rubsA[rub]||0, vB = rubsB[rub]||0, d = vB-vA;
    const cls = d<-0.001?'delta-negative':d>0.001?'delta-positive':'delta-zero';
    return `<div class="compare-row">
      <div>${rub}</div>
      <div>${vA>0?formatCO2(vA):'—'}</div>
      <div>${vB>0?formatCO2(vB):'—'}</div>
      <div class="${cls}">${d===0?'=':(d>0?'+':'')+formatCO2(d)}</div>
    </div>`;
  }).join('');

  const totalRow = `<div class="compare-row total-row">
    <div>TOTAL</div>
    <div>${formatCO2(totA)}</div>
    <div>${formatCO2(totB)}</div>
    <div class="${delta<0?'delta-negative':delta>0?'delta-positive':'delta-zero'}">${delta===0?'=':(delta>0?'+':'')+formatCO2(delta)}</div>
  </div>`;

  // Bar chart comparison
  const barGroups = allRubs.map((rub,i) => {
    const vA = rubsA[rub]||0, vB = rubsB[rub]||0;
    const pA = (vA/maxVal*100).toFixed(1), pB = (vB/maxVal*100).toFixed(1);
    return `<div class="compare-bar-group">
      <div class="compare-bar-label">${rub}</div>
      <div class="compare-bar-pair">
        <div class="compare-bar-row">
          <div class="compare-bar-name">${evA.icon} ${evA.name}</div>
          <div class="compare-bar-track"><div class="compare-bar-fill" style="width:${pA}%;background:var(--vert)"></div></div>
          <div class="compare-bar-val co2-low">${vA>0?formatCO2(vA):'—'}</div>
        </div>
        <div class="compare-bar-row">
          <div class="compare-bar-name">${evB.icon} ${evB.name}</div>
          <div class="compare-bar-track"><div class="compare-bar-fill" style="width:${pB}%;background:var(--bleu)"></div></div>
          <div class="compare-bar-val" style="color:var(--bleu)">${vB>0?formatCO2(vB):'—'}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  out.innerHTML = summaryCards + `
    <div class="compare-header-row"><div>Rubrique</div><div>${evA.icon} ${evA.name}</div><div>${evB.icon} ${evB.name}</div><div>Écart</div></div>
    ${tableRows}${totalRow}
    <div class="compare-bar-section" style="margin-top:24px"><h3 style="font-size:13px;font-weight:700;margin-bottom:14px">Comparaison par rubrique</h3>${barGroups}</div>`;
}

// ===== MODAL =====
let editingEventId = null;
function openNewEventModal() {
  editingEventId = null;
  document.getElementById('modalTitle').textContent = 'Nouvel événement';
  document.getElementById('eventName').value = '';
  document.getElementById('eventDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('eventDesc').value = '';
  selectIcon('🎪');
  document.getElementById('eventModal').classList.add('visible');
  setTimeout(() => document.getElementById('eventName').focus(), 100);
}
function openEditModal(evId) {
  editingEventId = evId;
  const ev = events.find(e => e.id===evId); if(!ev) return;
  document.getElementById('modalTitle').textContent = "Modifier l'événement";
  document.getElementById('eventName').value = ev.name;
  document.getElementById('eventDate').value = ev.date||'';
  document.getElementById('eventDesc').value = ev.desc||'';
  selectIcon(ev.icon);
  document.getElementById('eventModal').classList.add('visible');
}
function closeModal() { document.getElementById('eventModal').classList.remove('visible'); }
function selectIcon(icon) {
  selectedIcon = icon;
  document.querySelectorAll('.icon-opt').forEach(b => b.classList.toggle('active', b.textContent===icon));
}
function saveEvent() {
  const name = document.getElementById('eventName').value.trim();
  if (!name) { document.getElementById('eventName').focus(); return; }
  if (editingEventId) {
    const ev = events.find(e => e.id===editingEventId);
    if (ev) { ev.name=name; ev.date=document.getElementById('eventDate').value; ev.desc=document.getElementById('eventDesc').value.trim(); ev.icon=selectedIcon; }
    currentEventId = editingEventId;
  } else {
    const ev = { id: Date.now().toString(), name, date: document.getElementById('eventDate').value, desc: document.getElementById('eventDesc').value.trim(), icon: selectedIcon, items: [] };
    events.unshift(ev); currentEventId = ev.id;
  }
  saveEvents(currentEventId); closeModal(); renderSidebar();
  showView('events');
}
function deleteEvent(evId) {
  if (!confirm('Supprimer cet événement ?')) return;
  events = events.filter(e => e.id!==evId);
  if (currentEventId===evId) currentEventId = events.length>0 ? events[0].id : null;
  saveEvents(); renderSidebar();
  deleteEventFromSupabase(evId);
  if (currentEventId) selectEvent(currentEventId);
  else { const d=document.getElementById('eventDetail'); if(d) d.style.display='none'; const es=document.getElementById('emptyState'); if(es) es.style.display=''; }
}

// ===== EXPORT =====
function exportCSV(evId) {
  const ev = events.find(e => e.id===evId); if(!ev) return;
  const rows = [
    ['Élément','Catégorie','Rubrique','Quantité','Unité','CO2e (kg)','Type'],
    ...ev.items.map(i => [i.label, i.categorie, i.rubrique, i.quantite, i.input_unit, i.co2_total.toFixed(6), i.ai?'IA':i.elec?'Elec':'ADEME']),
    ['TOTAL','','','','',totalCO2(ev).toFixed(6),'']
  ];
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(';')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'}));
  a.download = 'bilan-carbone-'+ev.name.replace(/\s+/g,'-')+'.csv';
  a.click(); showToast('CSV téléchargé !', true);
}

let authMode = 'login';

function switchAuthTab(mode) {
  authMode = mode;
  document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
  document.getElementById('tabSignup').classList.toggle('active', mode === 'signup');
  document.getElementById('btnAuth').textContent = mode === 'login' ? 'Se connecter' : 'Créer mon compte';
  document.getElementById('authError').classList.remove('visible');

async function submitAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError');
  const okEl = document.getElementById('authSuccess');
  const btn = document.getElementById('btnAuth');
  errEl.classList.remove('visible');
  okEl.classList.remove('visible');

  if (!email || !password) { errEl.textContent = 'Entrez un e-mail et un mot de passe'; errEl.classList.add('visible'); return; }
  if (password.length < 6) { errEl.textContent = 'Le mot de passe doit faire au moins 6 caractères'; errEl.classList.add('visible'); return; }

  btn.disabled = true;
  btn.textContent = authMode === 'login' ? 'Connexion…' : 'Création…';

  try {
    if (authMode === 'login') {
      const data = await sbAuth('token?grant_type=password', { email, password });
      saveSession(data);
      await enterApp();
    } else {
      const data = await sbAuth('signup', { email, password });
      if (data.access_token) {
        saveSession(data);
        await enterApp();
      } else {
        okEl.textContent = 'Compte créé ! Vous pouvez vous connecter.';
        okEl.classList.add('visible');
        switchAuthTab('login');
      }
    }
  } catch(e) {
    errEl.textContent = e.message;
    errEl.classList.add('visible');
  }
  btn.disabled = false;
  btn.textContent = authMode === 'login' ? 'Se connecter' : 'Créer mon compte';
}

function logout() {
  clearSession();
  events = [];
  currentEventId = null;
  document.getElementById('appRoot').style.display = 'none';
  document.getElementById('authScreen').classList.add('visible');
  document.getElementById('authEmail').value = '';
  document.getElementById('authPassword').value = '';
}

async function enterApp() {
  document.getElementById('authScreen').classList.remove('visible');
  document.getElementById('appRoot').style.display = 'block';
  document.getElementById('userEmail').textContent = currentUser.email;

  const indicator = document.createElement('div');
  indicator.style.cssText = 'position:fixed;top:70px;right:20px;background:#1e2a22;color:white;padding:8px 16px;border-radius:8px;font-size:12px;z-index:999';
  indicator.textContent = '⏳ Chargement de vos événements…';
  document.body.appendChild(indicator);
  try {
    events = await loadEventsFromSupabase();
    localStorage.setItem('carbonEvents', JSON.stringify(events));
    indicator.textContent = '✅ ' + events.length + ' événement(s) chargé(s)';
  } catch(e) {
    events = JSON.parse(localStorage.getItem('carbonEvents') || '[]');
    indicator.textContent = '⚠️ Mode hors-ligne';
  }
  setTimeout(() => indicator.remove(), 2000);

  renderSidebar();
  updateSaveStatus();
  if (events.length>0) { currentEventId=events[0].id; selectEvent(currentEventId); }
  else { showView('events'); }
}

// ===== INIT =====
document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeModal(); cancelSelection(); const l=document.getElementById('resultsList'); if(l) l.classList.remove('visible'); }
  if (e.key==='Enter') {
    if (document.getElementById('authScreen').classList.contains('visible')) { submitAuth(); return; }
    if (!document.getElementById('eventModal').classList.contains('visible') && selectedItem) addItemToEvent();
  }
});

document.getElementById('loadingScreen').style.display = 'none';

(async () => {
  if (loadSession()) {
    // Session existante : tente d'entrer directement
    try {
      await enterApp();
    } catch(e) {
      clearSession();
      document.getElementById('authScreen').classList.add('visible');
    }
  } else {
    document.getElementById('authScreen').classList.add('visible');
  }
})();
</script>
